<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock-Paper-Scissor</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1><b><i><u>ROCK-PAPER-SCISSOR</u></i></b></h1>
        <div id="container">
            <div id="rock" class="icon">👊</div>
            <div id="paper" class="icon">🤚</div>
            <div id="scissor" class="icon">✌️</div>
        </div>
        <div id="scoreBoard">
            <div class="userScore">
                <p><b><i>YOU  =></i></b></p>
                <p id="user">0</p>
            </div>
            <div class="compScore">
                <p><b><i>COMPUTER  =></i></b></p>
                <p id="comp">0</p>
            </div>
        </div>
        <div id="msg_Container">
            <p id="msg"><b><i>PLAY YOUR MOVE</i></b></p>
        </div>
        <script src="script.js"></script>
    </body>
</html>
